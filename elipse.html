<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elipse</title>
</head>

<style>
    /* Para centralizar as figuras */
    .container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    }

    .elipse {
        width: 300px;
        height: 150px;
        background-color: hsl(180, 100%, 68%);
        clip-path: ellipse(50% 50% at 50% 50%);
    }

</style>

<body>
    
    <div class="container">
        <div class="elipse"></div>
    </div>

</body>
</html>
