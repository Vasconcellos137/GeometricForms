<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexagono</title>
</head>

<style>
    /* Para centralizar as figuras */
    .container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    }

    .hexagono {
        width: 200px;
        height: 200px;
        background-color: hsl(60, 100%, 68%);
        clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }

</style>

<body>
    
    <div class="container">
        <div class="hexagono"></div>
    </div>
    
</body>
</html>
