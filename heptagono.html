<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heptagono</title>
</head>

<style>
    /* Para centralizar as figuras */
    .container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    }

    .heptagono {
        width: 200px;
        height: 200px;
        background-color: hsl(300, 100%, 68%);
        clip-path: polygon(50% 0%, 90% 20%, 100% 60%, 80% 100%, 20% 100%, 0% 60%, 10% 20%);
    }
</style>

<body>

    <div class="container">
        <div class="heptagono"></div>
    </div>

</body>
</html>
