<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pentágono</title>
</head>

<style>
    /* Para centralizar as figuras */
    .container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    }

    .pentagono {
        width: 200px;
        height: 150px;
        background-color: hsl(333, 100%, 33%);
        clip-path: polygon(50% 0%, 90% 38%, 72% 100%, 28% 100%, 10% 38%);
    }

</style>

<body>
    
    <div class="container">
        <div class="pentagono"></div>
    </div>  

</body>
</html>
