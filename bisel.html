<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bisel</title>
</head>

<style>

    /* Para centralizar as figuras */
    .container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    }

    .bisel {
        width: 200px;
        height: 200px;
        background-color: hsl(70, 100%, 68%);
        clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%, 0% 20%);
    }

</style>

<body>
    <div class="container">
        <div class="bisel"></div>
    </div>
</body>

</html>
