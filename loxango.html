<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>losango</title>
</head>

<style>
    /* Para centralizar as figuras */
    .container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .losango {
        width: 200px;
        height: 200px;
        background-color: hsl(120, 100%, 11%);
        clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    }
</style>


<body>
    <div class="container">
        <div class="losango"></div>
    </div>
</body>

</html>
